# Purpose: Runs the full South Africa tourism platform with separate frontend,
# backend, PostgreSQL, and MongoDB services for local development or demo use.
services:
  backend:
    build:
      context: ./backend
    container_name: mzansi-backend
    env_file:
      - ./backend/.env.example
      - path: ./backend/.env
        required: false
    environment:
      NODE_ENV: development
      PORT: 5000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: tourism
      POSTGRES_USER: tourism_admin
      POSTGRES_PASSWORD: tourism_password
      MONGO_URI: mongodb://mongo:27017/tourism_content
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    container_name: mzansi-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    command: npm run dev -- --host 0.0.0.0

  postgres:
    image: postgres:16-alpine
    container_name: mzansi-postgres
    environment:
      POSTGRES_DB: tourism
      POSTGRES_USER: tourism_admin
      POSTGRES_PASSWORD: tourism_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tourism_admin -d tourism"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: mzansi-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  postgres-data:
  mongo-data:
